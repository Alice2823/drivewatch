name: macOS Release Automation

on:
  release:
    types: [published]

jobs:
  build-mac:
    name: Build & Upload macOS Artifacts
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build macOS
        # This script runs electron-vite build and then electron-builder with --publish always.
        # This ensures all updater files (DMG, latest-mac.yml, and blockmaps) are generated.
        # Even if the internal publisher fails to upload to an existing release,
        # the next step will explicitly upload them.
        run: npm run build:mac-ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Artifacts to GitHub Release
        # Using softprops/action-gh-release to explicitly upload the generated 
        # assets to the release that triggered this workflow.
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        with:
          files: |
            dist/DriveWatch.dmg
            dist/latest-mac.yml
            dist/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
