appId: com.drivewatch.app
productName: DriveWatch

directories:
  buildResources: build

extraResources:
  - from: build/icon.ico
    to: icon.ico
  - from: build/resources/smartctl.exe
    to: smartctl.exe
  - from: resources/monitor
    to: monitor

asarUnpack:
  - resources/**
  - node_modules/systeminformation/**

win:
  icon: build/icon.ico
  executableName: DriveWatch
  requestedExecutionLevel: requireAdministrator
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  artifactName: DriveWatch-Setup.${ext}
  shortcutName: DriveWatch
  uninstallDisplayName: DriveWatch
  createDesktopShortcut: always
  createStartMenuShortcut: true
  runAfterFinish: true

publish:
  provider: github
  owner: Alice2823
  repo: drivewatch