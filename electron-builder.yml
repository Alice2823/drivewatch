appId: com.drivewatch.app
productName: DriveWatch

directories:
  buildResources: build

extraResources:
  - from: build/icon.ico
    to: icon.ico
  - from: build/resources/smartctl.exe
    to: smartctl.exe
  - from: resources/monitor
    to: monitor

asarUnpack:
  - resources/**
  - node_modules/systeminformation/**

win:
  icon: build/icon.ico
  executableName: DriveWatch
  requestedExecutionLevel: requireAdministrator
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  artifactName: DriveWatch-Setup.${ext}
  shortcutName: DriveWatch
  uninstallDisplayName: DriveWatch
  createDesktopShortcut: always
  createStartMenuShortcut: true
  runAfterFinish: true

mac:
  icon: build/icon.icns
  category: public.app-category.utilities
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - x64
        - arm64

dmg:
  artifactName: DriveWatch.${ext}
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file

publish:
  provider: github
  owner: Alice2823
  repo: drivewatch